---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-billing-app
  namespace: billing-modernization
  labels:
    app: legacy-billing-app
    component: legacy
    version: v1.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legacy-billing-app
  template:
    metadata:
      labels:
        app: legacy-billing-app
        component: legacy
        version: v1.0.0
      annotations:
        description: "Legacy Java 8 system - demonstrates BEFORE modernization"
    spec:
      containers:
      - name: legacy-billing-app
        image: image-registry.openshift-image-registry.svc:5000/billing-modernization/legacy-billing-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: DB_URL
          value: "jdbc:postgresql://postgresql:5432/billing"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: database-user
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: database-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: legacy-billing-app
  namespace: billing-modernization
  labels:
    app: legacy-billing-app
spec:
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: legacy-billing-app
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: legacy-billing-app
  namespace: billing-modernization
  labels:
    app: legacy-billing-app
  annotations:
    description: "Route for Legacy Billing Application (Java 8)"
spec:
  to:
    kind: Service
    name: legacy-billing-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

