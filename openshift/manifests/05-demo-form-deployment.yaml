---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-form-html
  namespace: billing-modernization
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>IBM Bob - Billing System Comparison Demo</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                overflow: hidden;
            }

            .header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 30px;
                text-align: center;
            }

            .header h1 {
                font-size: 2.5em;
                margin-bottom: 10px;
            }

            .header p {
                font-size: 1.2em;
                opacity: 0.9;
            }

            .content {
                padding: 40px;
            }

            .form-section {
                background: #f8f9fa;
                padding: 30px;
                border-radius: 15px;
                margin-bottom: 30px;
            }

            .form-section h2 {
                color: #667eea;
                margin-bottom: 20px;
                font-size: 1.8em;
            }

            .form-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin-bottom: 20px;
            }

            .form-group {
                display: flex;
                flex-direction: column;
            }

            .form-group label {
                font-weight: 600;
                margin-bottom: 8px;
                color: #333;
            }

            .form-group input,
            .form-group textarea {
                padding: 12px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                font-size: 1em;
                transition: border-color 0.3s;
            }

            .form-group input:focus,
            .form-group textarea:focus {
                outline: none;
                border-color: #667eea;
            }

            .form-group textarea {
                resize: vertical;
                min-height: 80px;
            }

            .submit-btn {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 15px 40px;
                border: none;
                border-radius: 10px;
                font-size: 1.1em;
                font-weight: 600;
                cursor: pointer;
                transition: transform 0.2s, box-shadow 0.2s;
                width: 100%;
            }

            .submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            }

            .submit-btn:active {
                transform: translateY(0);
            }

            .submit-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
            }

            .results-section {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 30px;
                margin-top: 30px;
            }

            .result-box {
                background: #f8f9fa;
                padding: 25px;
                border-radius: 15px;
                border: 2px solid #e0e0e0;
            }

            .result-box h3 {
                margin-bottom: 15px;
                font-size: 1.5em;
            }

            .result-box.legacy h3 {
                color: #dc3545;
            }

            .result-box.modern h3 {
                color: #28a745;
            }

            .result-content {
                background: white;
                padding: 20px;
                border-radius: 10px;
                font-family: 'Courier New', monospace;
                font-size: 0.9em;
                max-height: 400px;
                overflow-y: auto;
                white-space: pre-wrap;
                word-wrap: break-word;
            }

            .loading {
                text-align: center;
                padding: 20px;
                color: #667eea;
            }

            .error {
                color: #dc3545;
                background: #f8d7da;
                padding: 15px;
                border-radius: 8px;
                margin-top: 10px;
            }

            .success {
                color: #28a745;
                background: #d4edda;
                padding: 15px;
                border-radius: 8px;
                margin-top: 10px;
            }

            .comparison-table {
                width: 100%;
                margin-top: 30px;
                border-collapse: collapse;
                background: white;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }

            .comparison-table th,
            .comparison-table td {
                padding: 15px;
                text-align: left;
                border-bottom: 1px solid #e0e0e0;
            }

            .comparison-table th {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                font-weight: 600;
            }

            .comparison-table tr:last-child td {
                border-bottom: none;
            }

            .comparison-table tr:hover {
                background: #f8f9fa;
            }

            .check {
                color: #28a745;
                font-weight: bold;
            }

            .cross {
                color: #dc3545;
                font-weight: bold;
            }

            @media (max-width: 768px) {
                .results-section {
                    grid-template-columns: 1fr;
                }

                .header h1 {
                    font-size: 1.8em;
                }

                .content {
                    padding: 20px;
                }
            }

            .spinner {
                border: 3px solid #f3f3f3;
                border-top: 3px solid #667eea;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                animation: spin 1s linear infinite;
                margin: 20px auto;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🚀 IBM Bob - Billing System Comparison</h1>
                <p>Side-by-Side Demonstration: Legacy vs Modern Architecture</p>
            </div>

            <div class="content">
                <div class="form-section">
                    <h2>📝 Create Invoice</h2>
                    <form id="invoiceForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="customerId">Customer ID *</label>
                                <input type="text" id="customerId" name="customerId" required placeholder="e.g., CUST001">
                            </div>
                            <div class="form-group">
                                <label for="amount">Amount *</label>
                                <input type="number" id="amount" name="amount" step="0.01" required placeholder="e.g., 99.99">
                            </div>
                            <div class="form-group">
                                <label for="dueDate">Due Date</label>
                                <input type="date" id="dueDate" name="dueDate">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="description">Description *</label>
                            <textarea id="description" name="description" required placeholder="e.g., Monthly subscription fee"></textarea>
                        </div>
                        <button type="submit" class="submit-btn" id="submitBtn">
                            🔄 Create Invoice in Both Systems
                        </button>
                    </form>
                </div>

                <div class="results-section" id="resultsSection" style="display: none;">
                    <div class="result-box legacy">
                        <h3>❌ Legacy System (Java 8)</h3>
                        <div class="result-content" id="legacyResult">
                            <div class="loading">Waiting for request...</div>
                        </div>
                    </div>
                    <div class="result-box modern">
                        <h3>✅ Modern System (Java 17 + Spring Boot)</h3>
                        <div class="result-content" id="modernResult">
                            <div class="loading">Waiting for request...</div>
                        </div>
                    </div>
                </div>

                <table class="comparison-table">
                    <thead>
                        <tr>
                            <th>Feature</th>
                            <th>Legacy System</th>
                            <th>Modern System</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>Java Version</strong></td>
                            <td>Java 8</td>
                            <td>Java 17</td>
                        </tr>
                        <tr>
                            <td><strong>Framework</strong></td>
                            <td>Standalone Java</td>
                            <td>Spring Boot 3.x</td>
                        </tr>
                        <tr>
                            <td><strong>API Documentation</strong></td>
                            <td class="cross">✗ None</td>
                            <td class="check">✓ Swagger/OpenAPI</td>
                        </tr>
                        <tr>
                            <td><strong>Input Validation</strong></td>
                            <td class="cross">✗ None</td>
                            <td class="check">✓ Bean Validation</td>
                        </tr>
                        <tr>
                            <td><strong>Error Handling</strong></td>
                            <td class="cross">✗ printStackTrace</td>
                            <td class="check">✓ Global Exception Handler</td>
                        </tr>
                        <tr>
                            <td><strong>Security</strong></td>
                            <td class="cross">✗ SQL Injection Vulnerable</td>
                            <td class="check">✓ Parameterized Queries</td>
                        </tr>
                        <tr>
                            <td><strong>Logging</strong></td>
                            <td class="cross">✗ System.out.println</td>
                            <td class="check">✓ SLF4J + Logback</td>
                        </tr>
                        <tr>
                            <td><strong>Monitoring</strong></td>
                            <td class="cross">✗ None</td>
                            <td class="check">✓ Prometheus Metrics</td>
                        </tr>
                        <tr>
                            <td><strong>Health Checks</strong></td>
                            <td class="cross">✗ None</td>
                            <td class="check">✓ Spring Actuator</td>
                        </tr>
                        <tr>
                            <td><strong>Database Access</strong></td>
                            <td class="cross">✗ Raw JDBC</td>
                            <td class="check">✓ Spring Data JPA</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <script>
            const LEGACY_URL = 'https://legacy-billing-app-billing-modernization.apps.69ccbf51306b4437a3a7ff2a.am1.techzone.ibm.com/legacy/invoices';
            const MODERN_URL = 'https://billing-app-billing-modernization.apps.69ccbf51306b4437a3a7ff2a.am1.techzone.ibm.com/api/v1/invoices';

            document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const submitBtn = document.getElementById('submitBtn');
                const resultsSection = document.getElementById('resultsSection');
                const legacyResult = document.getElementById('legacyResult');
                const modernResult = document.getElementById('modernResult');

                // Disable submit button
                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Processing...';

                // Show results section
                resultsSection.style.display = 'grid';

                // Show loading spinners
                legacyResult.innerHTML = '<div class="spinner"></div><div class="loading">Sending request to legacy system...</div>';
                modernResult.innerHTML = '<div class="spinner"></div><div class="loading">Sending request to modern system...</div>';

                // Get form data
                const formData = {
                    customerId: document.getElementById('customerId').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    description: document.getElementById('description').value
                };

                const dueDate = document.getElementById('dueDate').value;
                if (dueDate) {
                    formData.dueDate = dueDate;
                }

                // Call both APIs
                const legacyPromise = callAPI(LEGACY_URL, formData, 'legacy');
                const modernPromise = callAPI(MODERN_URL, formData, 'modern');

                const [legacyResponse, modernResponse] = await Promise.all([legacyPromise, modernPromise]);

                // Display results
                legacyResult.innerHTML = formatResponse(legacyResponse, 'legacy');
                modernResult.innerHTML = formatResponse(modernResponse, 'modern');

                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = '🔄 Create Invoice in Both Systems';
            });

            async function callAPI(url, data, system) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });

                    const responseData = await response.text();
                    
                    return {
                        success: response.ok,
                        status: response.status,
                        statusText: response.statusText,
                        data: responseData,
                        system: system
                    };
                } catch (error) {
                    return {
                        success: false,
                        error: error.message,
                        system: system
                    };
                }
            }

            function formatResponse(response, system) {
                if (response.error) {
                    return `<div class="error">
                        <strong>❌ Error:</strong><br>
                        ${response.error}
                    </div>`;
                }

                let html = `<div class="${response.success ? 'success' : 'error'}">
                    <strong>Status:</strong> ${response.status} ${response.statusText}
                </div>`;

                html += `<div style="margin-top: 15px;">
                    <strong>Response:</strong><br>
                    <pre style="margin-top: 10px; background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto;">${formatJSON(response.data)}</pre>
                </div>`;

                return html;
            }

            function formatJSON(str) {
                try {
                    const obj = JSON.parse(str);
                    return JSON.stringify(obj, null, 2);
                } catch (e) {
                    return str;
                }
            }

            // Set default due date to 30 days from now
            const today = new Date();
            today.setDate(today.getDate() + 30);
            document.getElementById('dueDate').value = today.toISOString().split('T')[0];
        </script>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-form
  namespace: billing-modernization
  labels:
    app: demo-form
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-form
  template:
    metadata:
      labels:
        app: demo-form
    spec:
      containers:
      - name: httpd
        image: registry.access.redhat.com/ubi8/httpd-24
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: html
          mountPath: /var/www/html
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: html
        configMap:
          name: demo-form-html

---
apiVersion: v1
kind: Service
metadata:
  name: demo-form
  namespace: billing-modernization
  labels:
    app: demo-form
spec:
  selector:
    app: demo-form
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-form
  namespace: billing-modernization
  labels:
    app: demo-form
spec:
  to:
    kind: Service
    name: demo-form
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

